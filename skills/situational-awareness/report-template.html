<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Situational Awareness — Portfolio Dashboard</title>
<style>
:root, [data-theme="dark"] {
  --bg: #0f1419;
  --surface: #1a2028;
  --surface-elevated: #222d38;
  --border: #2d3a47;
  --text: #e4e8ec;
  --text-muted: #8b9db0;
  --green: #34d399;
  --green-bg: rgba(52, 211, 153, 0.08);
  --amber: #fbbf24;
  --amber-bg: rgba(251, 191, 36, 0.08);
  --red: #f87171;
  --red-bg: rgba(248, 113, 113, 0.08);
  --fire-orange: #fb923c;
  --fire-orange-bg: rgba(251, 146, 60, 0.06);
  --fire-escalated: #ef4444;
  --fire-escalated-bg: rgba(239, 68, 68, 0.08);
  --fire-waiting: #d97706;
  --fire-waiting-bg: rgba(217, 119, 6, 0.06);
  --fire-resolved: #6b7280;
  --fire-resolved-bg: rgba(107, 114, 128, 0.06);
  --blocked: #a78bfa;
  --blocked-bg: rgba(167, 139, 250, 0.08);
  --onhold: #6b7280;
  --onhold-bg: rgba(107, 114, 128, 0.06);
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
  --section-initiatives-bg: rgba(30, 40, 50, 0.3);
}

[data-theme="light"] {
  --bg: #ffffff;
  --surface: #f8f9fa;
  --surface-elevated: #f1f3f5;
  --border: #e2e6ea;
  --text: #1a1a2e;
  --text-muted: #5c6370;
  --green: #059669;
  --green-bg: rgba(5, 150, 105, 0.06);
  --amber: #d97706;
  --amber-bg: rgba(217, 119, 6, 0.06);
  --red: #dc2626;
  --red-bg: rgba(220, 38, 38, 0.05);
  --fire-orange: #ea580c;
  --fire-orange-bg: rgba(234, 88, 12, 0.05);
  --fire-escalated: #dc2626;
  --fire-escalated-bg: rgba(220, 38, 38, 0.05);
  --fire-waiting: #b45309;
  --fire-waiting-bg: rgba(180, 83, 9, 0.05);
  --fire-resolved: #6b7280;
  --fire-resolved-bg: rgba(107, 114, 128, 0.05);
  --blocked: #7c3aed;
  --blocked-bg: rgba(124, 58, 237, 0.05);
  --onhold: #6b7280;
  --onhold-bg: rgba(107, 114, 128, 0.05);
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --section-initiatives-bg: rgba(241, 243, 245, 0.6);
}

@media (prefers-color-scheme: light) {
  :root:not([data-theme="dark"]) {
    --bg: #ffffff;
    --surface: #f8f9fa;
    --surface-elevated: #f1f3f5;
    --border: #e2e6ea;
    --text: #1a1a2e;
    --text-muted: #5c6370;
    --green: #059669;
    --green-bg: rgba(5, 150, 105, 0.06);
    --amber: #d97706;
    --amber-bg: rgba(217, 119, 6, 0.06);
    --red: #dc2626;
    --red-bg: rgba(220, 38, 38, 0.05);
    --fire-orange: #ea580c;
    --fire-orange-bg: rgba(234, 88, 12, 0.05);
    --fire-escalated: #dc2626;
    --fire-escalated-bg: rgba(220, 38, 38, 0.05);
    --fire-waiting: #b45309;
    --fire-waiting-bg: rgba(180, 83, 9, 0.05);
    --fire-resolved: #6b7280;
    --fire-resolved-bg: rgba(107, 114, 128, 0.05);
    --blocked: #7c3aed;
    --blocked-bg: rgba(124, 58, 237, 0.05);
    --onhold: #6b7280;
    --onhold-bg: rgba(107, 114, 128, 0.05);
    --radius: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --section-initiatives-bg: rgba(241, 243, 245, 0.6);
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body, .stat-card, .card, .section-fires, .section-initiatives,
details .detail-content, .checkpoint-list li {
  transition: background-color 150ms ease, color 150ms ease, border-color 150ms ease;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  padding: 24px;
  max-width: 1200px;
  margin: 0 auto;
}

header {
  margin-bottom: 32px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

header h1 {
  font-size: 1.5rem;
  font-weight: 600;
  letter-spacing: -0.02em;
}

header .header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

header .timestamp {
  font-size: 0.8rem;
  color: var(--text-muted);
}

.theme-toggle {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  width: 32px;
  height: 32px;
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background-color 150ms ease, border-color 150ms ease;
}

.theme-toggle:hover {
  background: var(--surface-elevated);
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
  gap: 12px;
  margin-bottom: 32px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
}

.stat-card .value {
  font-size: 2rem;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 4px;
}

.stat-card .label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
}

.stat-card.green .value { color: var(--green); }
.stat-card.amber .value { color: var(--amber); }
.stat-card.red .value { color: var(--red); }
.stat-card.blocked .value { color: var(--blocked); }
.stat-card.onhold .value { color: var(--onhold); }
.stat-card.fire-active .value { color: var(--fire-orange); }
.stat-card.fire-escalated .value { color: var(--fire-escalated); }
.stat-card.fire-waiting .value { color: var(--fire-waiting); }

section {
  margin-bottom: 32px;
}

section h2 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-fires {
  background: var(--fire-orange-bg);
  border: 1px solid rgba(251, 146, 60, 0.2);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 32px;
}

.section-fires h2 {
  border-bottom-color: rgba(251, 146, 60, 0.3);
}

.section-initiatives {
  background: var(--section-initiatives-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 32px;
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 12px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}

.card-header {
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
}

.card-header .title {
  font-weight: 600;
  font-size: 0.9rem;
}

.card-header .badge {
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 2px 8px;
  border-radius: 4px;
}

.badge-escalated { background: var(--fire-escalated-bg); color: var(--fire-escalated); border: 1px solid var(--fire-escalated); }
.badge-active { background: var(--fire-orange-bg); color: var(--fire-orange); border: 1px solid var(--fire-orange); }
.badge-waiting { background: var(--fire-waiting-bg); color: var(--fire-waiting); border: 1px solid var(--fire-waiting); }
.badge-resolved { background: var(--fire-resolved-bg); color: var(--fire-resolved); border: 1px solid var(--fire-resolved); }
.badge-red { background: var(--red-bg); color: var(--red); border: 1px solid var(--red); }
.badge-amber { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber); }
.badge-green { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
.badge-blocked { background: var(--blocked-bg); color: var(--blocked); border: 1px solid var(--blocked); }
.badge-onhold { background: var(--onhold-bg); color: var(--onhold); border: 1px solid var(--onhold); }

.card-body {
  padding: 12px 16px;
}

.card-body .meta {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 8px;
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.card-body .meta span {
  display: flex;
  align-items: center;
  gap: 4px;
}

.card-body .impact {
  font-size: 0.85rem;
  margin-bottom: 8px;
}

.card-body .current-state {
  font-size: 0.82rem;
  color: var(--text-muted);
}

.stall-warning {
  color: var(--amber);
  font-size: 0.75rem;
  font-weight: 600;
  margin-top: 6px;
}

details {
  cursor: pointer;
}

details summary {
  list-style: none;
  padding: 0;
}

details summary::-webkit-details-marker { display: none; }

details .detail-content {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-size: 0.8rem;
  color: var(--text-muted);
  background: var(--surface-elevated);
}

details .detail-content table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 8px;
  font-size: 0.75rem;
}

details .detail-content th,
details .detail-content td {
  text-align: left;
  padding: 4px 8px;
  border-bottom: 1px solid var(--border);
}

details .detail-content th {
  color: var(--text-muted);
  font-weight: 600;
}

.checkpoints-section {
  margin-top: 32px;
}

.checkpoint-list {
  list-style: none;
}

.checkpoint-list li {
  padding: 8px 12px;
  border-left: 3px solid var(--amber);
  margin-bottom: 8px;
  background: var(--surface);
  border-radius: 0 var(--radius) var(--radius) 0;
  font-size: 0.85rem;
  display: flex;
  justify-content: space-between;
}

.checkpoint-list li .date {
  color: var(--amber);
  font-weight: 600;
  font-size: 0.8rem;
}

.empty-state {
  text-align: center;
  color: var(--text-muted);
  padding: 24px;
  font-size: 0.85rem;
}

.card.fire-card { border-left: 3px solid var(--fire-orange); }
.card.fire-card.escalated { border-left-color: var(--fire-escalated); }
.card.fire-card.waiting { border-left-color: var(--fire-waiting); }
.card.fire-card.resolved { border-left-color: var(--fire-resolved); }

.card.initiative-card.red { border-left: 3px solid var(--red); }
.card.initiative-card.amber { border-left: 3px solid var(--amber); }
.card.initiative-card.green { border-left: 3px solid var(--green); }
.card.initiative-card.blocked { border-left: 3px solid var(--blocked); }
.card.initiative-card.onhold { border-left: 3px solid var(--onhold); }

.loading {
  text-align: center;
  color: var(--text-muted);
  padding: 48px;
  font-size: 0.9rem;
}
</style>
</head>
<body>

<header>
  <h1>Situational Awareness</h1>
  <div class="header-right">
    <span class="timestamp" id="timestamp"></span>
    <button class="theme-toggle" id="theme-toggle" title="Toggle theme"></button>
  </div>
</header>

<div class="summary-grid" id="summary-grid"></div>

<div id="fires-section"></div>

<div id="initiatives-section"></div>

<div id="checkpoints-section"></div>

<div class="loading" id="loading">Loading dashboard data...</div>

<script>
(function initTheme() {
  const stored = localStorage.getItem('sa-theme');
  const toggle = document.getElementById('theme-toggle');

  function applyTheme(theme) {
    if (theme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
      toggle.textContent = '☽';
    } else if (theme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      toggle.textContent = '☀';
    } else {
      document.documentElement.removeAttribute('data-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      toggle.textContent = prefersDark ? '☀' : '☽';
    }
  }

  function getEffectiveTheme() {
    const s = localStorage.getItem('sa-theme');
    if (s === 'light' || s === 'dark') return s;
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }

  applyTheme(stored);

  toggle.addEventListener('click', function() {
    const current = getEffectiveTheme();
    const next = current === 'dark' ? 'light' : 'dark';
    localStorage.setItem('sa-theme', next);
    applyTheme(next);
  });

  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
    if (!localStorage.getItem('sa-theme')) applyTheme(null);
  });
})();

function loadData() {
  // Try fetch first (works when served via HTTP)
  fetch('./dashboard-data.json?' + Date.now())
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(DATA => {
      document.getElementById('loading').remove();
      render(DATA);
    })
    .catch(() => {
      // Fallback for file:// protocol: load via dynamic script tag
      const s = document.createElement('script');
      s.src = './dashboard-data.js?' + Date.now();
      s.onload = () => {
        if (window.DASHBOARD_DATA) {
          document.getElementById('loading').remove();
          render(window.DASHBOARD_DATA);
        }
      };
      s.onerror = () => {
        document.getElementById('loading').textContent = 'Failed to load dashboard data. Run /situational-awareness to generate it.';
      };
      document.body.appendChild(s);
    });
}
loadData();

function formatDate(d) {
  if (!d) return '—';
  const date = new Date(d);
  return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function render(DATA) {
  document.getElementById('timestamp').textContent = 'Generated: ' + formatDate(DATA.generated);

  const s = DATA.summary;
  const grid = document.getElementById('summary-grid');
  const stats = [
    { value: s.initiatives.total, label: 'Initiatives', cls: '' },
    { value: s.initiatives.green, label: 'Green', cls: 'green' },
    { value: s.initiatives.amber, label: 'Amber', cls: 'amber' },
    { value: s.initiatives.red, label: 'Red', cls: 'red' },
    { value: s.initiatives.blocked, label: 'Blocked', cls: 'blocked' },
    { value: s.initiatives.onHold, label: 'On Hold', cls: 'onhold' },
    { value: s.fires.escalated, label: 'Escalated', cls: 'fire-escalated' },
    { value: s.fires.active, label: 'Active Fires', cls: 'fire-active' },
    { value: s.fires.waiting, label: 'Waiting', cls: 'fire-waiting' },
  ];
  grid.innerHTML = stats.map(st => `
    <div class="stat-card ${st.cls}">
      <div class="value">${st.value}</div>
      <div class="label">${st.label}</div>
    </div>
  `).join('');

  const firesEl = document.getElementById('fires-section');
  const fires = DATA.fires || [];
  if (fires.length > 0) {
    firesEl.innerHTML = `
      <div class="section-fires">
        <h2>Firefighting Tracker</h2>
        <div class="card-grid">
          ${fires.map(f => renderFireCard(f)).join('')}
        </div>
      </div>
    `;
  }

  const initEl = document.getElementById('initiatives-section');
  const sections = [
    { key: 'red', label: 'Red — Immediate Attention', badge: 'red' },
    { key: 'amber', label: 'Amber — Drifting', badge: 'amber' },
    { key: 'blocked', label: 'Blocked', badge: 'blocked' },
    { key: 'green', label: 'Green — On Track', badge: 'green' },
    { key: 'onHold', label: 'On Hold', badge: 'onhold' },
  ];

  let initHTML = '<div class="section-initiatives"><h2>Initiatives</h2>';
  for (const sec of sections) {
    const items = (DATA.initiatives[sec.key] || []);
    if (items.length === 0) continue;
    initHTML += `<h3 style="font-size:0.85rem;color:var(--text-muted);margin:16px 0 8px;text-transform:uppercase;letter-spacing:0.04em;">${sec.label}</h3>`;
    initHTML += `<div class="card-grid">${items.map(i => renderInitiativeCard(i, sec.badge)).join('')}</div>`;
  }
  initHTML += '</div>';
  initEl.innerHTML = initHTML;

  const cpEl = document.getElementById('checkpoints-section');
  const checkpoints = DATA.checkpoints || [];
  if (checkpoints.length > 0) {
    cpEl.innerHTML = `
      <section class="checkpoints-section">
        <h2>Upcoming Checkpoints (Next 14 Days)</h2>
        <ul class="checkpoint-list">
          ${checkpoints.map(cp => `<li><span>${cp.title} (${cp.type})</span><span class="date">${formatDate(cp.date)}</span></li>`).join('')}
        </ul>
      </section>
    `;
  }
}

function renderFireCard(f) {
  const statusClass = f.status;
  const badgeClass = 'badge-' + f.status;
  const expanded = (f.status === 'escalated' || f.status === 'active') ? 'open' : '';
  const stall = f.stalling ? `<div class="stall-warning">&#9888; ${f.stallReason || 'Stalling — no update in ' + f.daysActive + ' days'}</div>` : '';

  return `
    <details class="card fire-card ${statusClass}" ${expanded}>
      <summary>
        <div class="card-header">
          <span class="title">${f.title}</span>
          <span class="badge ${badgeClass}">${f.status}</span>
        </div>
        <div class="card-body">
          <div class="meta">
            <span>Driver: ${f.driver}</span>
            <span>Priority: ${f.priority}</span>
            <span>${f.daysActive} days</span>
          </div>
          <div class="impact">${f.impact || ''}</div>
          ${stall}
        </div>
      </summary>
      <div class="detail-content">
        <strong>Current State:</strong> ${f.currentState || '—'}
        ${f.statusLog ? '<table><tr><th>Date</th><th>Entry</th></tr>' + f.statusLog.map(l => `<tr><td>${l.date}</td><td>${l.entry}</td></tr>`).join('') + '</table>' : ''}
      </div>
    </details>
  `;
}

function renderInitiativeCard(i, badge) {
  const expanded = (badge === 'red' || badge === 'amber') ? 'open' : '';

  return `
    <details class="card initiative-card ${badge}" ${expanded}>
      <summary>
        <div class="card-header">
          <span class="title">${i.title}</span>
          <span class="badge badge-${badge}">${badge === 'onhold' ? 'on hold' : badge}</span>
        </div>
        <div class="card-body">
          <div class="meta">
            <span>Priority: ${i.priority || '—'}</span>
            <span>Goal: ${i.goal || '—'}</span>
            ${i.checkpoint ? `<span>Checkpoint: ${formatDate(i.checkpoint)}</span>` : ''}
          </div>
          <div class="current-state">${i.currentStep || i.trigger || ''}</div>
          ${i.delegations ? `<div class="meta" style="margin-top:6px"><span>Delegates: ${i.delegations}</span></div>` : ''}
        </div>
      </summary>
      <div class="detail-content">
        ${i.lastLog ? `<strong>Last log:</strong> ${i.lastLog}` : ''}
        ${i.recommendedAction ? `<br><strong>Recommended:</strong> ${i.recommendedAction}` : ''}
      </div>
    </details>
  `;
}
</script>
</body>
</html>
